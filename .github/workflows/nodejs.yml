name: Node.js CI

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: self-hosted

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: yarn install

      - name: Clean Yarn cache
        run: yarn cache clean

      - name: Stop existing PM2 process
        run: pm2 stop index.js|| true

      - name: Start PM2 process
        run: pm2 start index.js

      # Additional step to handle errors explicitly
      - name: Check PM2 list
        run: pm2 list

      # Optional: Upload logs as an artifact
      - name: Archive production logs
        if: failure() # Only run this step if previous steps failed
        uses: actions/upload-artifact@v2
        with:
          name: pm2-logs
          path: ~/.pm2/logs/*.log
