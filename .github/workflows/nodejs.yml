name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20.x"

      - name: Install dependencies
        run: yarn install

      - name: Deploy to EC2
        env:
          EC2_PRIVATE_KEY: ${{ secrets.EC2_PRIVATE_KEY }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USERNAME: ${{ secrets.EC2_USERNAME }}
        run: |
          echo "$EC2_PRIVATE_KEY" > crs.pem
          chmod 600 crs.pem
          # Ensure the directory exists and has correct permissions
          ssh -i crs.pem $EC2_USERNAME@$EC2_HOST "mkdir -p /var/www/crs-backend && sudo chown -R $EC2_USERNAME /var/www/"
          # Copy files to the correct directory
          scp -i crs.pem -r ./* $EC2_USERNAME@$EC2_HOST:/var/www/crs-backend/
          # Execute commands on the server
          ssh -i crs.pem $EC2_USERNAME@$EC2_HOST << 'EOF'
            cd /var/www/crs-backend
            yarn install --production
            pm2 restart all || pm2 start index.js --name "crs-backend"
          EOF
          rm crs.pem
